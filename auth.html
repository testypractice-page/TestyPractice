<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Testy – Login / Sign up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="manifest" href="favicon/site.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">
<link rel="shortcut icon" href="favicon/favicon.ico">
  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Local storage helpers -->
  <script src="storage.js"></script>

  <!-- Firebase (keep these exactly like this) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <style>
    :root {
      --bg-body: #f3f7fc;
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-soft: #d1d5db;
      --blue-accent: #3b82f6;
      --blue-deep: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
    }

    body.dark-mode {
      --bg-body: #0a0f1f;
      --bg-card: #0d1528;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-soft: rgba(255, 255, 255, 0.08);
      --blue-accent: #2563eb;
      --blue-deep: #1e40af;
      --danger: #f97373;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont,
        sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0, var(--bg-body) 55%);
      color: var(--text-main);
      transition: background-color 0.25s ease, color 0.25s ease;
    }
    /* Input text in both modes */
input::placeholder {
  color: #8F959E !important;
}
input {
  color: var(--text-main);
}

/* Dark mode fix */
body.dark-mode input::placeholder {
  color: #B0B6C0 !important;   /* Light grey/white text */
}
body.dark-mode input {
  background-color: #111827 !important;  /* dark slate */
  border-color: #374151 !important;       /* soft border */
  color: #C2D0ED;
}

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: var(--bg-card);
      border-radius: 18px;
      border: 1px solid var(--border-soft);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 18px 18px 16px;
      overflow: hidden;
    }

    .auth-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .icon-btn {
      padding: 6px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease, border-color 0.18s ease,
        transform 0.08s ease;
    }

    .icon-btn:hover {
      background: rgba(148, 163, 184, 0.1);
      border-color: var(--blue-accent);
    }

    .icon-btn:active {
      transform: scale(0.94);
    }

    .hint-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .form-panel {
      display: block;
      margin: 0;
    }

    .hidden-panel {
      display: none;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease,
        background-color 0.18s ease;
      background: rgba(255, 255, 255, 0.9);
    }

    body.dark-mode .field input {
      background: #020617;
    }

    .field input:focus {
      border-color: var(--blue-accent);
      box-shadow: 0 0 0 1px var(--blue-accent);
    }

    .help-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .checkbox-row input {
      width: 15px;
      height: 15px;
      accent-color: var(--blue-accent);
    }

    .main-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--blue-accent);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.4);
      transition: background-color 0.18s ease, box-shadow 0.18s ease,
        transform 0.08s ease;
    }

    .main-btn:hover {
      background: var(--blue-deep);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.5);
    }

    .main-btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 5px rgba(15, 23, 42, 0.3);
    }

    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      min-height: 16px;
    }

    .success-msg {
      font-size: 12px;
      color: var(--success);
      margin-top: 6px;
      min-height: 16px;
    }

    .link-row {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .link-btn {
      border: none;
      background: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      color: var(--blue-accent);
      cursor: pointer;
      text-decoration: none;
      font-family: 'Poppins';
    }

    /* Google button uses same base style as a "secondary" button */
    .secondary-btn {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: rgba(148, 163, 184, 0.08);
      font-size: 13px;
      cursor: pointer;
      color: var(--text-main);
      transition: background-color 0.18s ease, border-color 0.18s ease,
        box-shadow 0.18s ease, transform 0.08s ease;
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--blue-accent);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.18);
    }

    .secondary-btn:active {
      transform: scale(0.97);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.15);
    }

    /* Google specific tweaks */
    #googleLoginBtn {
      background: #ffffff;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 5px rgba(15, 23, 42, 0.16);
      font-weight: 500;
    }

    #googleLoginBtn i {
      font-size: 16px;
    }

    body.dark-mode #googleLoginBtn {
      background: #0f172a;
      border-color: #4b5563;
      color: #e5e7eb;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    body.dark-mode #googleLoginBtn i {
      color: #e5e7eb;
    }

    #googleLoginBtn span:first-child {
      font-size: 16px;
    }

    .logged-state {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .logged-state strong {
      font-weight: 600;
    }
    a {
  color: inherit;
  text-decoration: none;
}
    hr {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <div>
        <div class="brand-title"><a href="index.html">Testy</a></div>
        <div class="brand-sub">Login / Sign up</div> <hr>
      </div>
      <button id="themeToggle" type="button" class="icon-btn">🌙</button>
    </div>

    <div id="hint" class="hint-text">
      Login to continue your practice &amp; stats on this device.
    </div>

    <!-- LOGIN FORM (default) -->
    <form id="loginForm" class="form-panel" autocomplete="on" novalidate>
      <div class="field">
        <label for="loginId">Email</label>
        <input
          id="loginId"
          name="loginId"
          type="email"
          autocomplete="username"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input
          id="loginPassword"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="help-row">
        <label class="checkbox-row">
          <input type="checkbox" id="rememberMe" />
          <span>Keep me logged in on this device</span>
        </label>
      </div>

      <button type="submit" class="main-btn">Login</button>
      <div id="loginError" class="error-msg"></div>
      <div id="loginSuccess" class="success-msg"></div>

      <div class="link-row">
        Don’t have an account?
        <button type="button" id="toSignupLink" class="link-btn">
          Create one
        </button>
      </div>
    </form>

    <!-- SIGNUP FORM (hidden initially) -->
    <form
      id="signupForm"
      class="form-panel hidden-panel"
      autocomplete="on"
      novalidate
    >
      <div class="field">
        <label for="signupName">Name</label>
        <input
          id="signupName"
          name="name"
          type="text"
          autocomplete="name"
          placeholder="Enter your name"
          required
        />
      </div>

      <div class="field">
        <label for="signupEmail">Email</label>
        <input
          id="signupEmail"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="field">
        <label for="signupPassword">Password</label>
        <input
          id="signupPassword"
          name="new-password"
          type="password"
          autocomplete="new-password"
          placeholder="Minimum 6 characters"
          required
        />
      </div>

      <div class="field">
        <label for="signupPassword2">Confirm password</label>
        <input
          id="signupPassword2"
          type="password"
          placeholder="Re-type your password"
          required
        />
      </div>

      <button type="submit" class="main-btn">Create account</button>
      <div id="signupError" class="error-msg"></div>
      <div id="signupSuccess" class="success-msg"></div>

      <div class="link-row">
        Already have an account?
        <button type="button" id="toLoginLink" class="link-btn">
          Login
        </button>
      </div>
    </form>

    <!-- GOOGLE LOGIN BUTTON -->
    <div
      class="hint-text"
      style="text-align: center; margin-top: 10px; margin-bottom: 6px"
    >
      — or —
    </div>
    <button
      id="googleLoginBtn"
      type="button"
      class="secondary-btn"
      style="
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      "
    >
      <i class="fa-brands fa-google"></i>
      <span>Continue with Google</span>
    </button>
    <div id="googleError" class="error-msg"></div>

    <!-- LOGGED-IN STATE -->
    <div id="loggedState" class="logged-state" style="display: none">
      Logged in as <strong id="currentUserLabel"></strong>
      <br />
      <button id="gotoApp" type="button" class="link-btn">Go to Testy</button>
      &nbsp;|&nbsp;
      <button id="gotoProfile" type="button" class="link-btn">Profile</button>
      &nbsp;|&nbsp;
      <button id="logoutBtn" type="button" class="link-btn">Log out</button>
    </div>
  </div>

  <script>
    // =============== THEME TOGGLE ===============
    const THEME_KEY = "quizTheme_v1";
    const themeToggle = document.getElementById("themeToggle");

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("dark-mode");
        if (themeToggle) themeToggle.textContent = "☀️";
      } else {
        document.body.classList.remove("dark-mode");
        if (themeToggle) themeToggle.textContent = "🌙";
      }
      try {
        localStorage.setItem(THEME_KEY, theme);
      } catch (_) {}
    }

    function initTheme() {
      let saved = "light";
      try {
        const t = localStorage.getItem(THEME_KEY);
        if (t === "dark" || t === "light") saved = t;
      } catch (_) {}
      applyTheme(saved);
    }

    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        const isDark = document.body.classList.contains("dark-mode");
        applyTheme(isDark ? "light" : "dark");
      });
    }

    initTheme();

    // =============== UI ELEMENTS ===============
    const hint = document.getElementById("hint");

    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    const loginError = document.getElementById("loginError");
    const loginSuccess = document.getElementById("loginSuccess");
    const signupError = document.getElementById("signupError");
    const signupSuccess = document.getElementById("signupSuccess");

    const loggedState = document.getElementById("loggedState");
    const currentUserLabel = document.getElementById("currentUserLabel");
    const gotoAppBtn = document.getElementById("gotoApp");
    const gotoProfileBtn = document.getElementById("gotoProfile");
    const logoutBtn = document.getElementById("logoutBtn");

    const googleBtn = document.getElementById("googleLoginBtn");
    const googleError = document.getElementById("googleError");

    const toSignupLink = document.getElementById("toSignupLink");
    const toLoginLink = document.getElementById("toLoginLink");

    // =============== SIMPLE MODE SWITCH ===============
    function showLoginMode() {
      loginForm.classList.remove("hidden-panel");
      signupForm.classList.add("hidden-panel");
      hint.textContent =
        "Login to continue your practice & stats on this device.";
      loginError.textContent = "";
      loginSuccess.textContent = "";
      signupError.textContent = "";
      signupSuccess.textContent = "";
      if (googleError) googleError.textContent = "";
    }

    function showSignupMode() {
      signupForm.classList.remove("hidden-panel");
      loginForm.classList.add("hidden-panel");
      hint.textContent = "Create an account stored on this device only (for now).";
      loginError.textContent = "";
      loginSuccess.textContent = "";
      signupError.textContent = "";
      signupSuccess.textContent = "";
      if (googleError) googleError.textContent = "";
    }

    if (toSignupLink) {
      toSignupLink.addEventListener("click", showSignupMode);
    }
    if (toLoginLink) {
      toLoginLink.addEventListener("click", showLoginMode);
    }

    // =============== SIGNUP (local storage) ===============
    signupForm.addEventListener("submit", function (e) {
      e.preventDefault();

      if (!signupForm.checkValidity()) {
        signupForm.reportValidity();
        return;
      }

      signupError.textContent = "";
      signupSuccess.textContent = "";
      if (googleError) googleError.textContent = "";

      const name = document.getElementById("signupName").value.trim();
      const email = document
        .getElementById("signupEmail")
        .value.trim()
        .toLowerCase();
      const pass = document.getElementById("signupPassword").value;
      const pass2 = document.getElementById("signupPassword2").value;

      if (pass.length < 6) {
        signupError.textContent = "Password should be at least 6 characters.";
        return;
      }
      if (pass !== pass2) {
        signupError.textContent = "Passwords do not match.";
        return;
      }

      const result = createAccount(email, pass);
      if (!result.success) {
        signupError.textContent =
          result.message || "Could not create account.";
        return;
      }

      // local profile
      saveUserProfile({ name });

      signupSuccess.textContent = "Account created. Redirecting to profile...";
      updateLoggedState();

      setTimeout(() => {
        window.location.href = "profile.html";
      }, 500);
    });

    // =============== LOGIN (local storage) ===============
    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      if (!loginForm.checkValidity()) {
        loginForm.reportValidity();
        return;
      }

      loginError.textContent = "";
      loginSuccess.textContent = "";
      signupError.textContent = "";
      signupSuccess.textContent = "";
      if (googleError) googleError.textContent = "";

      const email = document
        .getElementById("loginId")
        .value.trim()
        .toLowerCase();
      const pass = document.getElementById("loginPassword").value;

      const result = loginUser(email, pass);
      if (!result.success) {
        loginError.textContent =
          result.message || "Invalid email or password.";
        return;
      }

      loginSuccess.textContent = "Logged in successfully. Redirecting...";
      updateLoggedState();

      setTimeout(() => {
        window.location.href = "index.html";
      }, 500);
    });

    // =============== LOGGED STATE (local + Firebase) ===============
    function updateLoggedState() {
      let labelText = "";
      let hasUser = false;

      // local storage user
      if (typeof getActiveUser === "function") {
        try {
          const localUser = getActiveUser();
          if (localUser && localUser.email) {
            const labelName =
              localUser.name && localUser.name.trim()
                ? localUser.name
                : "(no name)";
            labelText = `${labelName} – ${localUser.email}`;
            hasUser = true;
          }
        } catch (_) {}
      }

      // Firebase user
      if (typeof getFirebaseUser === "function") {
        try {
          const fbUser = getFirebaseUser();
          if (fbUser && fbUser.email) {
            const labelName =
              fbUser.displayName && fbUser.displayName.trim()
                ? fbUser.displayName
                : "(no name)";
            labelText = `${labelName} – ${fbUser.email}`;
            hasUser = true;
          }
        } catch (_) {}
      }

      if (hasUser) {
        loggedState.style.display = "block";
        currentUserLabel.textContent = labelText;
      } else {
        loggedState.style.display = "none";
        currentUserLabel.textContent = "";
      }
    }

    logoutBtn.addEventListener("click", async () => {
      if (typeof logoutUser === "function") {
        try {
          logoutUser();
        } catch (_) {}
      }

      if (typeof logOutFromFirebase === "function") {
        try {
          await logOutFromFirebase();
        } catch (_) {}
      }

      updateLoggedState();
      loginForm.reset();
      signupForm.reset();
      loginError.textContent = "";
      loginSuccess.textContent = "";
      signupError.textContent = "";
      signupSuccess.textContent = "";
      if (googleError) googleError.textContent = "";
    });

    gotoAppBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    gotoProfileBtn.addEventListener("click", () => {
      window.location.href = "profile.html";
    });

    // =============== GOOGLE LOGIN ===============
    if (googleBtn) {
      googleBtn.addEventListener("click", async () => {
        if (googleError) googleError.textContent = "";
        loginError.textContent = "";
        loginSuccess.textContent = "";
        signupError.textContent = "";
        signupSuccess.textContent = "";

        if (typeof loginWithGoogle !== "function") {
          if (googleError) {
            googleError.textContent =
              "Google login not ready yet. Configure Firebase first.";
          }
          return;
        }

        try {
          const user = await loginWithGoogle();
          if (!user) {
            if (googleError) {
              googleError.textContent =
                "Google login was cancelled or failed.";
            }
            return;
          }

          if (typeof saveUserProfile === "function") {
            try {
              saveUserProfile({
                name: user.displayName || "",
                email: user.email || "",
              });
            } catch (_) {}
          }

          updateLoggedState();
          loginSuccess.textContent = "Logged in with Google. Redirecting...";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
        } catch (err) {
          console.error(err);
          if (googleError) {
            googleError.textContent =
              "Google login failed. Please try again.";
          }
        }
      });
    }

    // =============== CUSTOM VALIDATION MESSAGES ===============
    function attachCustomMessages() {
      const signupEmail = document.getElementById("signupEmail");
      const signupPass = document.getElementById("signupPassword");
      const signupPass2 = document.getElementById("signupPassword2");
      const loginEmail = document.getElementById("loginId");
      const loginPassword = document.getElementById("loginPassword");

      function wire(input, messages) {
        if (!input) return;

        input.addEventListener("invalid", function () {
          this.setCustomValidity("");
          if (this.validity.valueMissing && messages.required) {
            this.setCustomValidity(messages.required);
          } else if (this.validity.typeMismatch && messages.typeMismatch) {
            this.setCustomValidity(messages.typeMismatch);
          }
        });

        input.addEventListener("input", function () {
          this.setCustomValidity("");
        });
      }

      wire(signupEmail, {
        required: "Please enter your email",
        typeMismatch: "Enter a valid email address",
      });

      wire(signupPass, {
        required: "Please enter a password",
      });

      wire(signupPass2, {
        required: "Please confirm your password",
      });

      wire(loginEmail, {
        required: "Email is required to login",
        typeMismatch: "Enter a valid email",
      });

      wire(loginPassword, {
        required: "Password is required to login",
      });
    }

    updateLoggedState();
    attachCustomMessages();
    showLoginMode(); // start on login
    
    if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW registration failed:", err));
  });
}
  </script>
</body>
</html>
